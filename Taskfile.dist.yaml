#action:module:specific
version: "3"

silent: true
vars:
  os: "{{OS}}"
  arch: '{{ternary "arm64" ARCH (eq ARCH "arm")}}'
  mode: '{{ternary "cgo" "go" (eq .os "linux")}}'
  built_trdl_bin_path: '{{.TRDL_BIN_PATH | default "$(go env GOPATH)/bin/trdl"}}'
  vault_plugin_bin_path: '{{.VAULT_PLUGIN_BIN_PATH | default "$(go env GOPATH)/bin/vault-plugin-docs"}}'
  goLDFlags: "-s -w"

tasks:
  sign:
    desc: 'Sign last version tag + origin/main and push signatures. Important vars: "refs".'
    cmds:
      - git fetch --tags -f
      - git signatures pull {{.CLI_ARGS}}
      - |
        for ref in {{.refs | default "$(git tag --sort=v:refname | tail -n1) origin/main"}}; do
          echo Signing $ref...
          git signatures add {{.CLI_ARGS}} $ref
          git signatures show {{.CLI_ARGS}} $ref
        done
      - git signatures push {{.CLI_ARGS}}

  _build:cgo:dev: &build_cgo_dev
    dir: "{{.dir}}"
    cmds:
      - go build {{if eq .raceDetectorEnabled "true" }}-race{{end}} -o "{{.outputDir | default (printf "./build/%s-%s" .targetOS .targetArch)}}/trdl{{if (eq .targetOS "windows")}}.exe{{end}}"
        -compiler gc -ldflags="{{.cgoLDFlags}}" -tags="{{.cgoTags}}" {{.extraGoBuildArgs}} {{.CLI_ARGS}} {{.package}}
    env:
      CGO_ENABLED: "1"
      GOOS: "{{.targetOS}}"
      GOARCH: "{{.targetArch}}"
      CC: "{{.cc}}"
    vars:
      raceDetectorEnabled: '{{.raceDetectorEnabled | default "false"}}'
      dir: "{{.dir}}"

  _build:cgo:dist:
    <<: *build_cgo_dev
    cmds:
      - go build -o "{{.outputDir | default (printf "./dist/%s/%s-%s/bin" .version .targetOS .targetArch)}}/trdl{{if (eq .targetOS "windows")}}.exe{{end}}"
        -compiler gc -ldflags="{{.cgoLDFlags}}" -tags="{{.cgoTags}}" {{.extraGoBuildArgs}} {{.CLI_ARGS}} {{.package}}

  _build:go:dev: &build_go_dev
    dir: "{{.dir}}"
    cmds:
      - go build {{if eq .raceDetectorEnabled "true" }}-race{{end}} -o "{{.outputDir | default (printf "./build/%s-%s" .targetOS .targetArch)}}/trdl{{if (eq .targetOS "windows")}}.exe{{end}}"
        -ldflags="{{.goLDFlags}}" -tags="{{.goTags}}" {{.extraGoBuildArgs}} {{.CLI_ARGS}} {{.package}}
    env:
      CGO_ENABLED: "0"
      GOOS: "{{.targetOS}}"
      GOARCH: "{{.targetArch}}"
    vars:
      raceDetectorEnabled: '{{.raceDetectorEnabled | default "false"}}'
      dir: "{{.dir}}"

  _build:go:dist:
    <<: *build_go_dev
    cmds:
      - go build -o "{{.outputDir | default (printf "./dist/%s/%s-%s/bin" .version .targetOS .targetArch)}}/trdl{{if (eq .targetOS "windows")}}.exe{{end}}"
        -ldflags="{{.goLDFlags}}" -tags="{{.goTags}}" {{.extraGoBuildArgs}} {{.CLI_ARGS}} {{.package}}

  build:
    desc: "Build all dev binaries."
    run: once
    cmds:
      - task: build:dev:{{.os}}:{{.arch}}
        vars:
          outputDir: '{{.outputDir | default "../bin"}}'
          extraGoBuildArgs: "{{.extraGoBuildArgs}}"
          raceDetectorEnabled: '{{.raceDetectorEnabled | default "false"}}'
          dir: "{{.dir}}"
      - task: build:server
        vars:
          dir: "{{.dir}}"

  build:dev:all:
    desc: "Build all trdl dev binaries in parallel."
    deps:
      - build:dev:linux:amd64:cgo
      - build:dev:linux:amd64:go
      - build:dev:linux:arm64
      - build:dev:darwin:amd64
      - build:dev:darwin:arm64
      - build:dev:windows:amd64

  build:dist:all:
    desc: "Build all trdl release binaries in parallel."
    deps:
      - build:dist:linux:amd64
      - build:dist:linux:arm64
      - build:dist:darwin:amd64
      - build:dist:darwin:arm64
      - build:dist:windows:amd64

  build:dev:linux:amd64:
    desc: "Build trdl dev binary for linux/amd64."
    cmds:
      - task: build:dev:linux:amd64:cgo
        vars:
          outputDir: "{{.outputDir}}"
          extraGoBuildArgs: "{{.extraGoBuildArgs}}"
          raceDetectorEnabled: "{{.raceDetectorEnabled}}"
          dir: "{{.dir}}"

  build:dev:linux:amd64:cgo:
    desc: "Build trdl dev binary for linux/amd64 with cgo."
    cmds:
      - task: _build:cgo:dev
        vars:
          targetOS: "linux"
          targetArch: "amd64"
          outputDir: "{{.outputDir}}"
          extraGoBuildArgs: "{{.extraGoBuildArgs}}"
          raceDetectorEnabled: "{{.raceDetectorEnabled}}"
          dir: "{{.dir}}"

  build:dev:linux:amd64:go:
    desc: "Build trdl dev binary for linux/amd64 without cgo."
    cmds:
      - task: _build:go:dev
        vars:
          targetOS: "linux"
          targetArch: "amd64"
          outputDir: "{{.outputDir}}"
          extraGoBuildArgs: "{{.extraGoBuildArgs}}"
          raceDetectorEnabled: "{{.raceDetectorEnabled}}"
          dir: "{{.dir}}"

  build:dist:linux:amd64:
    desc: 'Build trdl release binary for linux/amd64. Important vars: "version".'
    cmds:
      - task: _build:cgo:dist
        vars:
          targetOS: "linux"
          targetArch: "amd64"
          extraGoBuildArgs: "{{.extraGoBuildArgs}}"
          dir: "{{.dir}}"

  build:dev:linux:arm64:
    desc: "Build trdl dev binary for linux/arm64."
    cmds:
      - task: _build:cgo:dev
        vars:
          targetOS: "linux"
          targetArch: "arm64"
          cc: "aarch64-linux-gnu-gcc"
          outputDir: "{{.outputDir}}"
          extraGoBuildArgs: "{{.extraGoBuildArgs}}"
          raceDetectorEnabled: "{{.raceDetectorEnabled}}"
          dir: "{{.dir}}"

  build:dist:linux:arm64:
    desc: 'Build trdl release binary for linux/arm64. Important vars: "version".'
    cmds:
      - task: _build:cgo:dist
        vars:
          targetOS: "linux"
          targetArch: "arm64"
          cc: "aarch64-linux-gnu-gcc"
          extraGoBuildArgs: "{{.extraGoBuildArgs}}"
          dir: "{{.dir}}"

  build:dev:darwin:amd64:
    desc: "Build trdl dev binary for darwin/amd64."
    cmds:
      - task: _build:go:dev
        vars:
          targetOS: "darwin"
          targetArch: "amd64"
          outputDir: "{{.outputDir}}"
          extraGoBuildArgs: "{{.extraGoBuildArgs}}"
          raceDetectorEnabled: "{{.raceDetectorEnabled}}"
          dir: "{{.dir}}"

  build:dist:darwin:amd64:
    desc: 'Build trdl release binary for darwin/amd64. Important vars: "version".'
    cmds:
      - task: _build:go:dist
        vars:
          targetOS: "darwin"
          targetArch: "amd64"
          extraGoBuildArgs: "{{.extraGoBuildArgs}}"
          dir: "{{.dir}}"

  build:dev:darwin:arm64:
    desc: "Build trdl dev binary for darwin/arm64."
    cmds:
      - task: _build:go:dev
        vars:
          targetOS: "darwin"
          targetArch: "arm64"
          outputDir: "{{.outputDir}}"
          extraGoBuildArgs: "{{.extraGoBuildArgs}}"
          raceDetectorEnabled: "{{.raceDetectorEnabled}}"
          dir: "{{.dir}}"

  build:dist:darwin:arm64:
    desc: 'Build trdl release binary for darwin/arm64. Important vars: "version".'
    cmds:
      - task: _build:go:dist
        vars:
          targetOS: "darwin"
          targetArch: "arm64"
          extraGoBuildArgs: "{{.extraGoBuildArgs}}"
          dir: "{{.dir}}"

  build:dev:windows:amd64:
    desc: "Build trdl dev binary for windows/amd64."
    cmds:
      - task: _build:go:dev
        vars:
          targetOS: "windows"
          targetArch: "amd64"
          outputDir: "{{.outputDir}}"
          extraGoBuildArgs: "{{.extraGoBuildArgs}}"
          raceDetectorEnabled: "{{.raceDetectorEnabled}}"
          dir: "{{.dir}}"

  build:dist:windows:amd64:
    desc: 'Build trdl release binary for windows/amd64. Important vars: "version".'
    cmds:
      - task: _build:go:dist
        vars:
          targetOS: "windows"
          targetArch: "amd64"
          extraGoBuildArgs: "{{.extraGoBuildArgs}}"
          dir: "{{.dir}}"

  build-with-coverage:
    desc: "Build trdl binary to run E2E tests with coverage."
    cmds:
      - task: build:dev:{{.os}}:{{.arch}}
        vars:
          outputDir: '{{.outputDir | default "../bin"}}'
          extraGoBuildArgs: "-cover -covermode=atomic -coverpkg=./... "
          goTags: test_coverage
          dir: "{{.dir}}"

  deps:install:prettier:
    desc: "Install prettier."
    cmds:
      - npm install -g prettier

  deps:install:ginkgo:
    dir: $PWD
    desc: "Install ginkgo binary."
    cmds:
      - |
        version="$(go list -m -f '{{ printf `{{ .Version }}` }}' github.com/onsi/ginkgo/v2)"
        go install {{.CLI_ARGS}} github.com/onsi/ginkgo/v2/ginkgo@${version}

  deps:install:golangci-lint:
    desc: "Install golangci-lint binary."
    cmds:
      - curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin {{.golangcilintVersion | default "v1.57.1"}}

  lint:prettier:
    desc: "Check if prettier-formatted."
    deps:
      - lint:prettier:yaml

  lint:prettier:yaml:
    desc: "Check if yaml files are prettier-formatted."
    cmds:
      - prettier -c "**/*.yaml" "**/*.yml"

  lint:golangci-lint:
    desc: "Lint with golangci-lint"
    dir: $PWD
    cmds:
      - golangci-lint run ./... --config {{.GITHUB_WORKSPACE}}/.golangci.yaml

  format:
    desc: 'Run all code formatters. Important vars: "paths".'
    run: once
    cmds:
      - task: format:client
      - task: format:e2e
      - task: format:server

  format:client:
    desc: 'Format client code. Important vars: "paths".'
    cmds:
      - task: format:client:gci
      - task: format:client:gofumpt

  format:client:gci:
    desc: 'Format client code with gci. Important vars: "paths".'
    cmds:
      - gci write -s Standard -s Default -s 'Prefix(github.com/werf)' {{.CLI_ARGS}} {{.paths | default "client/"}}

  format:client:gofumpt:
    desc: 'Format client code with gofumpt. Important vars: "paths".'
    cmds:
      - gofumpt -extra -w {{.CLI_ARGS}} {{.paths | default "client/"}}

  format:e2e:
    desc: 'Format e2e code. Important vars: "paths".'
    cmds:
      - task: format:e2e:gci
      - task: format:e2e:gofumpt

  format:e2e:gci:
    desc: 'Format e2e code with gci. Important vars: "paths".'
    cmds:
      - gci write -s Standard -s Default -s 'Prefix(github.com/werf)' {{.CLI_ARGS}} {{.paths | default "e2e/"}}

  format:e2e:gofumpt:
    desc: 'Format e2e code with gofumpt. Important vars: "paths".'
    cmds:
      - gofumpt -extra -w {{.CLI_ARGS}} {{.paths | default "e2e/"}}

  format:server:
    desc: "Format server code"
    cmds:
      - task: format:server:gci
      - task: format:server:gofumpt

  format:server:gci:
    desc: 'Format server code with gci. Important vars: "paths".'
    cmds:
      - gci write -s Standard -s Default -s 'Prefix(github.com/werf)' {{.CLI_ARGS}} {{.paths | default "server/"}}

  format:server:gofumpt:
    desc: 'Format server code with gofumpt. Important vars: "paths".'
    cmds:
      - gofumpt -extra -w {{.CLI_ARGS}} {{.paths | default "server/"}}

  build:server:
    desc: Build vault plugin
    dir: server
    cmds:
      - go build -o vault/plugins/vault-plugin-secrets-trdl cmd/vault-plugin-secrets-trdl/main.go
    env:
      CGO_ENABLED: "0"
      GOOS: "{{OS}}"
      GOARCH: "amd64"

  clean:
    desc: "Clean all temporary files and build artifacts."
    cmds:
      - task: clean:binaries

  clean:binaries:
    desc: "Clean all built binaries."
    cmds:
      - task: clean:binaries:dev
      - task: clean:binaries:dist

  clean:binaries:dev:
    desc: "Clean built dev binaries."
    cmds:
      - rm -rf ./bin ./server/vault/plugins

  clean:binaries:dist:
    desc: "Clean built release binaries."
    cmds:
      - rm -rf ./dist

  docs:gen:
    desc: Regenerate references
    dir: docs
    cmds:
      - task: docs:reference:cli
      - task: docs:reference:vault-plugin
      - task: docs:reference:sidebar

  docs:reference:cli:
    desc: Regenerate CLI reference
    dir: docs
    cmds:
      - cd ../client && go install github.com/werf/trdl/client/cmd/trdl
      - "{{.built_trdl_bin_path}} docs ."

  docs:reference:vault-plugin:
    desc: Regenerate Vault Plugin reference
    dir: docs
    deps:
      - build:server
    cmds:
      - |
        {{.vault_plugin_bin_path}} generate-jekyll \
          --base-pages-url /reference/vault_plugin \
          --includes-dir _includes/reference/vault_plugin \
          --pages-dir pages_en/reference/vault_plugin \
          --sidebar-yml-path _data/sidebars/_vault_plugin.yml

  docs:reference:sidebar:
    desc: Compile reference sidebar
    dir: docs
    cmds:
      - |
        reference_sidebar_path="./_data/sidebars/reference.yml"
        cli_partial_path="./_data/sidebars/_cli.yml"
        vault_plugin_partial_path="./_data/sidebars/_vault_plugin.yml"
        reference_partial_path="./_data/sidebars/_reference.yml"
        echo "# This file is generated by Taskfile.yml" > "$reference_sidebar_path"
        echo "# DO NOT EDIT!" >> "$reference_sidebar_path"
        echo "" >> "$reference_sidebar_path"
        echo "# This is your sidebar TOC. The sidebar code loops through sections here and provides the appropriate formatting." >> "$reference_sidebar_path"
        echo "" >> "$reference_sidebar_path"
        cat "$cli_partial_path" >> "$reference_sidebar_path"
        echo "" >> "$reference_sidebar_path"
        cat "$vault_plugin_partial_path" >> "$reference_sidebar_path"
        echo "" >> "$reference_sidebar_path"
        cat "$reference_partial_path" >> "$reference_sidebar_path"

  _test:go-test:cgo:
    cmds:
      - go test -compiler gc -ldflags="{{.cgoLDFlags}}" -tags="{{.cgoTags}}" {{.extraTestGoTestArgs}} {{.CLI_ARGS}} {{.paths}}
    env:
      CGO_ENABLED: "1"
    vars:
      dir: "{{.dir}}"
    requires:
      vars:
        - paths

  _test:go-test:go:
    cmds:
      - go test -ldflags="{{.goLDFlags}}" -tags="{{.goTags}}" {{.extraTestGoTestArgs}} {{.CLI_ARGS}} {{.paths}}
    env:
      CGO_ENABLED: "0"
    vars:
      dir: "{{.dir}}"
    requires:
      vars:
        - paths

  test:go-test:
    desc: 'Run raw "go test". Important vars: "paths".'
    cmds:
      - task: _test:go-test:{{.mode}}
        vars:
          paths: "{{.paths}}"
          extraTestGoTestArgs: "{{.extraTestGoTestArgs}}"
          dir: "{{.dir}}"

  _test:ginkgo:cgo:
    cmds:
      - |
        ginkgo {{if eq .parallel "true" }}-p{{end}} -r -compiler gc -ldflags="{{.cgoLDFlags}}" -tags="{{.cgoTags}}" \
          {{if .labelFilter}}--label-filter="{{.labelFilter}}"{{end}} {{.CLI_ARGS}} {{.paths}}
    env:
      CGO_ENABLED: "1"
    vars:
      parallel: '{{.parallel | default "true"}}'
      dir: "{{.dir}}"
    requires:
      vars:
        - paths

  _test:ginkgo:go:
    cmds:
      - |
        ginkgo {{if eq .parallel "true" }}-p{{end}} -r -ldflags="{{.goLDFlags}}" -tags="{{.goTags}}" \
          {{if .labelFilter}}--label-filter="{{.labelFilter}}"{{end}} {{.CLI_ARGS}} {{.paths}}
    env:
      CGO_ENABLED: "0"
    vars:
      parallel: '{{.parallel | default "true"}}'
      dir: "{{.dir}}"
    requires:
      vars:
        - paths

  test:ginkgo:
    desc: 'Run raw "ginkgo". Important vars: "paths".'
    cmds:
      - task: _test:ginkgo:{{.mode}}
        vars:
          paths: "{{.paths}}"
          labelFilter: "{{.labelFilter}}"
          parallel: "{{.parallel}}"
          dir: "{{.dir}}"

  test:
    desc: 'Run all tests. Important vars: "paths"."paths" is relative path from "dir".'
    cmds:
      - task: test:unit
      - task: test:e2e

  test:unit:
    desc: 'Run all unit tests. Important vars: "paths"."paths" is relative path from "dir".'
    cmds:
      - task: test:unit:server
        vars:
          dir: "{{.dir}}"

  test:unit:server:
    desc: 'Run server unit tests.Important vars: "paths"."paths" is relative path from "dir".'
    dir: server
    cmds:
      - ginkgo --vet=off --race --keep-going --cover --coverpkg=./... --output-dir=$TRDL_TEST_COVERAGE_DIR ./...

  test:e2e:
    desc: 'Run all e2e tests. Important vars: "paths"."paths" is relative path from "dir".'
    cmds:
      - task: test:e2e:client
        vars:
          dir: "{{.dir}}"

  test:e2e:client:
    desc: 'Run all e2e tests. Important vars: "paths". "paths" is relative path from "dir".'
    dir: e2e
    cmds:
      - ginkgo -p --keep-going --cover --coverpkg=../client/... --output-dir=$TRDL_TEST_COVERAGE_DIR ./...
